train-sets:
  - data/traindata/traindata.de
  - data/traindata/traindata.de.en
vocabs:
  - data/traindata/de.yml
  - data/traindata/de.en.yml
tied-embeddings-all: false
workspace: 5000
optimizer-delay: 2
keep-best: true
overwrite: true
#no-restore-corpus: true
sigterm: save-and-exit
# Model
type: transformer
task: transformer-base

# Training
disp-freq: 1000u
save-freq: 5000u
max-length: 250
max-length-crop: false
shuffle: data
#sharding: global
#sync-freq: 200u
#cpu-threads: 0
mini-batch: 4096
mini-batch-words: 0
mini-batch-fit: true
mini-batch-fit-step: 10
sync-sgd: true
check-gradient-nan: true

# Validation
valid-sets:
  - data/traindata/validdata.de
  - data/traindata/validdata.de.en
valid-freq: 5000u
valid-metrics:
  - chrf
  - bleu
  - ce-mean-words
valid-reset-stalled: true
early-stopping: 5
early-stopping-on: first
beam-size: 4
normalize: 1
valid-mini-batch: 64
valid-max-length: 1000

